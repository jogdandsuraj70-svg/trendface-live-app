<div class="relative w-[390px] h-[844px] bg-black rounded-[48px] p-2.5 shadow-[0_25px_60px_-15px_rgba(0,0,0,0.85)] border-[5.5px] border-neutral-800 ring-1 ring-white/10 flex flex-col overflow-hidden select-none">
  
  <!-- Outer Bezel Screen Frame Accent -->
  <div class="absolute inset-[3px] border border-neutral-900 rounded-[42px] pointer-events-none z-50"></div>

  <!-- iOS Dynamic Island Notch -->
  <div class="absolute top-[14px] left-1/2 -translate-x-1/2 w-[100px] h-[26px] bg-black rounded-full z-50 flex items-center justify-between px-3 pointer-events-none shadow-sm">
    <span class="h-1 w-1 rounded-full bg-slate-900/60"></span>
    <span class="h-1.5 w-1.5 rounded-full bg-indigo-950/40 border border-indigo-900/50 shadow-inner"></span>
  </div>

  <!-- iOS Status Bar -->
  <div class="absolute top-[13px] left-6 right-6 h-[26px] z-40 flex items-center justify-between text-black dark:text-white px-2 pointer-events-none font-sans text-[11px] font-semibold tracking-tight">
    <!-- Time indicator -->
    <span>9:41 AM</span>
    
    <!-- Status Icons -->
    <div class="flex items-center gap-1.5">
      <!-- Signal Bars SVG -->
      <svg class="h-2.5 w-3.5 fill-current shrink-0" viewBox="0 0 24 24">
        <rect x="1" y="16" width="3" height="5" rx="0.5"></rect>
        <rect x="6.5" y="12" width="3" height="9" rx="0.5"></rect>
        <rect x="12" y="8" width="3" height="13" rx="0.5"></rect>
        <rect x="17.5" y="3" width="3" height="18" rx="0.5" class="opacity-100"></rect>
      </svg>
      <!-- Wi-Fi Icon -->
      <i class="pi pi-wifi text-[9px] shrink-0"></i>
      <!-- Battery Icon SVG -->
      <svg class="h-2.5 w-4 stroke-current fill-none shrink-0" viewBox="0 0 24 14" stroke-width="1.8">
        <rect x="1" y="1" width="18" height="12" rx="3"></rect>
        <rect x="3" y="3" width="10" height="8" rx="1" class="fill-current stroke-none"></rect>
        <path d="M21 4.5v5" stroke-linecap="round"></path>
      </svg>
    </div>
  </div>

  <!-- Screen Content Viewport -->
  <div class="w-full h-full bg-white dark:bg-slate-900 rounded-[38px] relative overflow-hidden flex flex-col z-10 transition-colors duration-300">
    <!-- Router view injection panel -->
    <div class="flex-1 overflow-y-auto overflow-x-hidden relative h-full">
      <router-outlet></router-outlet>
    </div>
  </div>

  <!-- iOS Bottom Home Indicator Bar -->
  <div class="absolute bottom-2.5 left-1/2 -translate-x-1/2 w-28 h-[4px] bg-black dark:bg-white rounded-full z-40 pointer-events-none opacity-85"></div>

</div>
