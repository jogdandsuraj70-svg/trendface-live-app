<div class="h-full w-full bg-white dark:bg-slate-900 flex flex-col p-6 animate-screen-in select-none overflow-y-auto transition-colors duration-300">

  <!-- ================= TOP HEADER BAR ================= -->
  <div class="flex items-center justify-between pt-2 shrink-0">
    <span class="text-lg font-extrabold text-slate-850 dark:text-white tracking-tight font-sans">TrendFace</span>

    <div class="flex items-center gap-3">
      <!-- Search Icon -->
      <button type="button" class="text-slate-700 dark:text-slate-300 active-tap">
        <i class="pi pi-search text-sm"></i>
      </button>
      <!-- User Avatar -->
      <div (click)="goBack()" class="h-8 w-8 rounded-full overflow-hidden border-2 border-brand-purple/30 cursor-pointer active-tap">
        <img [src]="profileImage()" class="h-full w-full object-cover" alt="User" />
      </div>
    </div>
  </div>

  <!-- ================= SEARCH BAR ================= -->
  <div class="pt-4 shrink-0 flex items-center gap-2.5">
    <div class="flex-1 relative flex items-center">
      <span class="absolute left-4 text-slate-400"><i class="pi pi-search text-xs"></i></span>
      <input
        type="text"
        [value]="searchQuery()"
        (input)="onSearchInput($event)"
        placeholder="Search artists, models, shoots..."
        class="w-full pl-10 pr-4 py-3 rounded-2xl border border-slate-150 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/40 text-[11px] font-semibold text-slate-850 dark:text-white placeholder-slate-350 focus:border-brand-cyan focus:bg-white transition-all outline-none"
      />
    </div>
    <!-- Filter Button -->
    <button
      (click)="openFilters()"
      type="button"
      class="h-10 w-10 rounded-2xl bg-slate-50 dark:bg-slate-900 border border-slate-150 dark:border-slate-800 text-slate-600 dark:text-slate-400 flex items-center justify-center cursor-pointer active-tap hover:bg-slate-100 transition-colors"
    >
      <i class="pi pi-sliders-h text-xs"></i>
    </button>
  </div>

  <!-- ================= RECENT SEARCHES ================= -->
  <div *ngIf="recentSearches.length > 0 && !searchQuery()" class="pt-5 shrink-0 space-y-3">
    <div class="flex justify-between items-center">
      <span class="text-xs font-extrabold text-brand-purple tracking-wide font-sans">Recent Searches</span>
      <button (click)="clearAllSearches()" class="text-[9px] font-extrabold text-slate-400 hover:text-brand-purple uppercase tracking-widest cursor-pointer active-tap transition-colors">CLEAR ALL</button>
    </div>

    <div class="flex flex-wrap gap-2">
      <span
        *ngFor="let term of recentSearches"
        (click)="onRecentClick(term)"
        class="inline-flex items-center gap-1.5 px-3.5 py-2 rounded-full bg-slate-50 dark:bg-slate-900 border border-slate-150 dark:border-slate-800 text-[10px] font-bold text-slate-650 dark:text-slate-400 cursor-pointer hover:bg-slate-100 active-tap transition-colors"
      >
        {{ term }}
        <button (click)="removeSearch(term); $event.stopPropagation()" class="text-slate-400 hover:text-slate-600 ml-0.5">
          <i class="pi pi-times text-[8px]"></i>
        </button>
      </span>
    </div>
  </div>

  <!-- ================= TRENDING SECTION ================= -->
  <div *ngIf="!searchQuery()" class="pt-4 shrink-0 space-y-2.5">
    <span class="text-xs font-extrabold text-brand-pink tracking-wide font-sans">Trending</span>

    <div class="flex flex-wrap gap-2">
      <button
        *ngFor="let tag of trendingTags()"
        (click)="onTrendingClick(tag)"
        type="button"
        class="px-3.5 py-2 rounded-full text-[10px] font-bold tracking-wide cursor-pointer active-tap transition-all"
        [class]="tag === '#MumbaiFashion'
          ? 'bg-brand-pink/10 text-brand-pink border border-brand-pink/20'
          : 'bg-slate-50 dark:bg-slate-900 border border-slate-150 dark:border-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-100'"
      >
        {{ tag }}
      </button>
    </div>
  </div>

  <!-- ================= CATEGORY TABS ================= -->
  <div class="pt-4 shrink-0 flex items-center gap-2 overflow-x-auto no-scrollbar scroll-smooth">
    <button
      *ngFor="let cat of categories()"
      (click)="selectCategory(cat)"
      type="button"
      [class]="selectedCategory() === cat
        ? 'px-4 py-2.5 rounded-full bg-brand-purple text-white font-extrabold text-[10px] tracking-wide shadow-sm shadow-brand-purple/15 transition-all cursor-pointer whitespace-nowrap active-tap'
        : 'px-4 py-2.5 rounded-full bg-slate-50 dark:bg-slate-900 border border-slate-150 dark:border-slate-800 text-slate-600 dark:text-slate-400 font-bold text-[10px] tracking-wide transition-all hover:bg-slate-100 cursor-pointer whitespace-nowrap active-tap'"
    >
      {{ cat }}
    </button>
  </div>

  <!-- ================= TALENT GRID ================= -->
  <div class="flex-1 pt-4 pb-6">

    <!-- Skeleton Loader -->
    <div *ngIf="isLoading()" class="grid grid-cols-2 gap-3.5">
      <div *ngFor="let i of [1,2,3,4]" class="aspect-[3/4] rounded-2xl bg-slate-100 dark:bg-slate-800 animate-pulse"></div>
    </div>

    <!-- Results Grid -->
    <div *ngIf="!isLoading()" class="grid grid-cols-2 gap-3.5">
      <div
        *ngFor="let talent of displayedTalents()"
        (click)="openProfile(talent.id)"
        class="relative aspect-[3/4] rounded-2xl overflow-hidden cursor-pointer group animate-screen-in shadow-sm"
      >
        <!-- Image -->
        <img
          [src]="talent.imageUrl"
          [alt]="talent.name"
          class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
          loading="lazy"
        />

        <!-- Gradient Overlay -->
        <div class="absolute inset-0 bg-gradient-to-t from-black/75 via-black/20 to-transparent"></div>

        <!-- Favorite Heart Icon -->
        <button
          (click)="toggleFavorite(talent.id, $event)"
          class="absolute top-3 right-3 h-7 w-7 rounded-full bg-white/20 backdrop-blur-sm flex items-center justify-center active-tap z-10 transition-all"
          [class.bg-brand-pink/20]="isFavorite(talent.id)"
        >
          <i
            [class]="isFavorite(talent.id) ? 'pi pi-heart-fill text-brand-pink text-[10px]' : 'pi pi-heart text-white text-[10px]'"
          ></i>
        </button>

        <!-- Name & Profession Overlay -->
        <div class="absolute bottom-0 left-0 right-0 p-3.5 z-10">
          <h3 class="text-[12px] font-extrabold text-white tracking-tight leading-none">{{ talent.name }}</h3>
          <p class="text-[9px] font-semibold text-white/70 mt-0.5 uppercase tracking-wider">{{ talent.role }}</p>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="!isLoading() && displayedTalents().length === 0" class="flex flex-col items-center justify-center py-16 text-center space-y-3">
      <div class="h-14 w-14 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center">
        <i class="pi pi-search text-slate-400 text-lg"></i>
      </div>
      <p class="text-xs font-bold text-slate-500">No results found</p>
      <p class="text-[10px] text-slate-400">Try a different search term or adjust your filters.</p>
    </div>
  </div>

</div>
