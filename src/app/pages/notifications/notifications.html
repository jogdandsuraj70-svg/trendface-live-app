<div class="h-full w-full bg-white dark:bg-slate-900 flex flex-col p-6 animate-screen-in select-none overflow-y-auto transition-colors duration-300">

  <!-- ================= HEADER BAR ================= -->
  <div class="flex items-center justify-between pt-2 shrink-0">
    <button
      (click)="back()"
      class="h-8 w-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 cursor-pointer active-tap">
      <i class="pi pi-arrow-left text-sm"></i>
    </button>
    <span class="text-md font-extrabold text-slate-850 dark:text-white font-sans tracking-wide">Notifications</span>
    <div class="w-8"></div>
  </div>

  <!-- ================= MAIN CONTENT ================= -->
  <div class="flex-1 py-5 space-y-6">

    <!-- ===== NEW SECTION ===== -->
    <div *ngIf="newNotifications.length > 0" class="space-y-4">
      <span class="text-xs font-extrabold text-brand-cyan tracking-wider uppercase font-sans">New</span>

      <div *ngFor="let notif of newNotifications" class="animate-screen-in">

        <!-- CONNECTION REQUEST -->
        <div *ngIf="notif.type === 'connection_request'" class="space-y-3 pb-5 border-b border-slate-100 dark:border-slate-800/50">
          <div class="flex items-start gap-3">
            <img [src]="notif.avatarUrl" class="h-10 w-10 rounded-full object-cover shrink-0 border border-slate-150" alt="User" />
            <div class="flex-1 min-w-0">
              <p class="text-[11.5px] font-bold text-slate-800 dark:text-white leading-snug">{{ notif.title }}</p>
              <p class="text-[9px] font-semibold text-slate-400 dark:text-slate-500 mt-0.5">{{ notif.subtitle }}</p>
            </div>
          </div>

          <!-- Accept / Ignore Buttons -->
          <div *ngIf="!isAccepted(notif.id)" class="flex gap-2.5 pl-13">
            <button
              (click)="acceptConnection(notif.id)"
              class="flex-1 py-2.5 rounded-xl bg-gradient-to-r from-brand-cyan to-brand-cyan/85 text-white text-[10px] font-extrabold tracking-wider shadow-sm shadow-brand-cyan/20 active-tap cursor-pointer transition-all hover:opacity-90"
            >
              Accept
            </button>
            <button
              (click)="ignoreConnection(notif.id)"
              class="flex-1 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 text-[10px] font-extrabold tracking-wider active-tap cursor-pointer transition-all hover:bg-slate-50"
            >
              Ignore
            </button>
          </div>

          <!-- Accepted State -->
          <div *ngIf="isAccepted(notif.id)" class="flex items-center gap-2 pl-13">
            <div class="flex-1 py-2.5 rounded-xl bg-brand-cyan/10 text-brand-cyan text-[10px] font-extrabold tracking-wider text-center flex items-center justify-center gap-1.5">
              <i class="pi pi-check text-[9px]"></i> Connected
            </div>
          </div>
        </div>

        <!-- MESSAGE NOTIFICATION -->
        <div *ngIf="notif.type === 'message'"
          (click)="onMessageClick(notif)"
          class="flex items-start gap-3 pb-5 border-b border-slate-100 dark:border-slate-800/50 cursor-pointer hover:bg-slate-50/50 rounded-xl p-2 -mx-2 transition-colors active-tap"
        >
          <div class="relative shrink-0">
            <img [src]="notif.avatarUrl" class="h-10 w-10 rounded-full object-cover border border-slate-150" alt="User" />
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-[11.5px] font-bold text-slate-800 dark:text-white leading-snug">{{ notif.title }}</p>
            <p class="text-[10px] font-medium text-slate-500 dark:text-slate-400 mt-0.5 italic">{{ notif.subtitle }}</p>
            <div class="flex items-center gap-1.5 mt-1.5">
              <span *ngIf="!notif.isRead" class="h-2 w-2 rounded-full bg-brand-cyan shrink-0"></span>
              <span class="text-[8.5px] font-bold text-slate-400 tracking-wide">{{ notif.timestamp }}</span>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- ===== EARLIER SECTION ===== -->
    <div *ngIf="earlierNotifications.length > 0" class="space-y-4">
      <span class="text-xs font-extrabold text-brand-purple tracking-wider uppercase font-sans">Earlier</span>

      <div *ngFor="let notif of earlierNotifications" class="animate-screen-in">

        <!-- MATCH NOTIFICATION -->
        <div *ngIf="notif.type === 'match'" class="flex items-start gap-3 pb-5 border-b border-slate-100 dark:border-slate-800/50">
          <div class="h-10 w-10 rounded-full bg-gradient-to-tr from-brand-purple to-brand-pink flex items-center justify-center shrink-0 shadow-sm">
            <i class="pi pi-sparkles text-white text-sm"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-[11.5px] font-bold text-slate-800 dark:text-white leading-snug">{{ notif.title }}</p>
            <p class="text-[10px] font-medium text-slate-500 dark:text-slate-400 mt-0.5 leading-relaxed">{{ notif.subtitle }}</p>
            <span class="text-[8.5px] font-bold text-slate-400 tracking-wide mt-1 block">{{ notif.timestamp }}</span>
          </div>
        </div>

        <!-- ENGAGEMENT NOTIFICATION -->
        <div *ngIf="notif.type === 'engagement'" class="flex items-start gap-3 pb-5 border-b border-slate-100 dark:border-slate-800/50">
          <div class="relative shrink-0">
            <img [src]="notif.avatarUrl" class="h-9 w-9 rounded-full object-cover border border-slate-150" alt="User" />
            <img *ngIf="notif.avatarUrl2" [src]="notif.avatarUrl2" class="h-6 w-6 rounded-full object-cover border-2 border-white dark:border-slate-900 absolute -bottom-1 -right-1.5" alt="User 2" />
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-[11.5px] font-bold text-slate-800 dark:text-white leading-snug">{{ notif.title }}</p>
            <span class="text-[8.5px] font-bold text-slate-400 tracking-wide mt-1 block">{{ notif.timestamp }}</span>
          </div>
        </div>

      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="!isLoading() && newNotifications.length === 0 && earlierNotifications.length === 0" class="flex flex-col items-center justify-center py-16 text-center space-y-3">
      <div class="h-14 w-14 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center">
        <i class="pi pi-bell text-slate-400 text-lg"></i>
      </div>
      <p class="text-xs font-bold text-slate-500">No notifications yet</p>
    </div>

  </div>
</div>
