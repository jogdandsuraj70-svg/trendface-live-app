<div class="h-full w-full bg-white dark:bg-slate-900 flex flex-col p-6 animate-screen-in select-none overflow-y-auto transition-colors duration-300">

  <!-- ================= HEADER BAR ================= -->
  <div class="flex items-center justify-between pt-2 shrink-0">
    <button
      (click)="back()"
      class="h-8 w-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 cursor-pointer active-tap">
      <i class="pi pi-arrow-left text-sm"></i>
    </button>
    <span class="text-md font-extrabold text-slate-850 dark:text-white font-sans tracking-widest uppercase">Filters</span>
    <button (click)="clearAll()" class="text-[9px] font-extrabold text-slate-400 hover:text-brand-purple uppercase tracking-widest cursor-pointer active-tap transition-colors">RESET</button>
  </div>

  <!-- ================= FILTER CONTENT ================= -->
  <div class="flex-1 py-5 space-y-6">

    <!-- CATEGORY -->
    <div class="space-y-3">
      <span class="text-xs font-extrabold text-brand-purple tracking-wide font-sans">Category</span>
      <div class="grid grid-cols-2 gap-2.5">
        <button
          *ngFor="let cat of categoryOptions()"
          (click)="toggleCategory(cat)"
          type="button"
          [class]="isCategorySelected(cat)
            ? 'py-2.5 rounded-xl bg-brand-purple text-white font-extrabold text-[10.5px] tracking-wide shadow-sm shadow-brand-purple/15 active-tap cursor-pointer transition-all'
            : 'py-2.5 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-150 dark:border-slate-800 text-slate-600 dark:text-slate-400 font-bold text-[10.5px] tracking-wide active-tap cursor-pointer transition-all hover:bg-slate-100'"
        >
          {{ cat }}
        </button>
      </div>
    </div>

    <!-- LOCATION -->
    <div class="space-y-3">
      <span class="text-xs font-extrabold text-brand-purple tracking-wide font-sans">Location</span>
      <div class="relative">
        <input
          type="text"
          [value]="locationQuery()"
          (input)="locationQuery.set($any($event.target).value); updateCount()"
          placeholder="Select city"
          class="w-full px-4 py-3 rounded-xl border border-slate-150 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/40 text-[11px] font-semibold text-slate-850 dark:text-white placeholder-slate-350 focus:border-brand-cyan transition-all outline-none pr-10"
        />
        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"><i class="pi pi-search text-xs"></i></span>
      </div>
      <button
        (click)="toggleCurrentLocation()"
        type="button"
        class="flex items-center gap-2 text-[10px] font-bold cursor-pointer active-tap transition-colors"
        [class]="useCurrentLocation() ? 'text-brand-cyan' : 'text-slate-500'"
      >
        <span class="h-2.5 w-2.5 rounded-full" [class]="useCurrentLocation() ? 'bg-brand-cyan' : 'bg-slate-300'"></span>
        Use current location
      </button>
    </div>

    <!-- EXPERIENCE LEVEL -->
    <div class="space-y-3">
      <span class="text-xs font-extrabold text-brand-purple tracking-wide font-sans">Experience Level</span>
      <div class="flex gap-2">
        <button
          *ngFor="let level of experienceLevels()"
          (click)="selectExperience(level)"
          type="button"
          [class]="selectedExperience() === level
            ? 'flex-1 py-2.5 rounded-xl bg-brand-purple text-white font-extrabold text-[10px] tracking-wide shadow-sm active-tap cursor-pointer transition-all'
            : 'flex-1 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-150 dark:border-slate-800 text-slate-600 dark:text-slate-400 font-bold text-[10px] tracking-wide active-tap cursor-pointer transition-all hover:bg-slate-100'"
        >
          {{ level }}
        </button>
      </div>
    </div>

    <!-- RATINGS -->
    <div class="space-y-3">
      <span class="text-xs font-extrabold text-brand-purple tracking-wide font-sans">Ratings</span>
      <div class="flex gap-2.5">
        <button
          *ngFor="let rating of ratingOptions()"
          (click)="selectRating(rating)"
          type="button"
          [class]="selectedRating() === rating
            ? 'flex-1 py-2.5 rounded-xl bg-amber-50 border border-amber-300 text-amber-700 font-extrabold text-[10.5px] tracking-wide active-tap cursor-pointer transition-all flex items-center justify-center gap-1.5'
            : 'flex-1 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-150 dark:border-slate-800 text-slate-600 dark:text-slate-400 font-bold text-[10.5px] tracking-wide active-tap cursor-pointer transition-all hover:bg-slate-100 flex items-center justify-center gap-1.5'"
        >
          <i class="pi pi-star-fill text-[9px]" [class]="selectedRating() === rating ? 'text-amber-500' : 'text-slate-400'"></i>
          {{ rating }}+
        </button>
      </div>
    </div>

    <!-- BUDGET RANGE -->
    <div class="space-y-3">
      <div class="flex items-center justify-between">
        <span class="text-xs font-extrabold text-brand-purple tracking-wide font-sans">Budget Range</span>
        <span class="text-[10px] font-bold text-slate-500">{{ formatBudget(budgetMin()) }} - {{ formatBudget(budgetMax()) }}</span>
      </div>

      <div class="relative pt-2 pb-1">
        <!-- Track background -->
        <div class="absolute top-1/2 left-0 right-0 h-1 bg-slate-200 dark:bg-slate-800 rounded-full -translate-y-1/2"></div>
        <!-- Active track -->
        <div
          class="absolute top-1/2 h-1 bg-brand-cyan rounded-full -translate-y-1/2"
          [style.left.%]="((budgetMin() - 5000) / 45000) * 100"
          [style.right.%]="100 - ((budgetMax() - 5000) / 45000) * 100"
        ></div>

        <!-- Min slider -->
        <input
          type="range"
          [min]="5000"
          [max]="50000"
          [step]="1000"
          [value]="budgetMin()"
          (input)="onBudgetMinChange($event)"
          class="absolute w-full top-0 h-full opacity-0 cursor-pointer z-20"
        />
        <!-- Min thumb visual -->
        <div
          class="absolute top-1/2 h-4 w-4 rounded-full bg-brand-cyan border-2 border-white shadow-md -translate-y-1/2 -translate-x-1/2 pointer-events-none z-10"
          [style.left.%]="((budgetMin() - 5000) / 45000) * 100"
        ></div>

        <!-- Max slider -->
        <input
          type="range"
          [min]="5000"
          [max]="50000"
          [step]="1000"
          [value]="budgetMax()"
          (input)="onBudgetMaxChange($event)"
          class="absolute w-full top-0 h-full opacity-0 cursor-pointer z-20"
        />
        <!-- Max thumb visual -->
        <div
          class="absolute top-1/2 h-4 w-4 rounded-full bg-brand-cyan border-2 border-white shadow-md -translate-y-1/2 -translate-x-1/2 pointer-events-none z-10"
          [style.left.%]="((budgetMax() - 5000) / 45000) * 100"
        ></div>
      </div>

      <div class="flex justify-between text-[8.5px] font-bold text-slate-400 uppercase tracking-widest">
        <span>MIN</span>
        <span>MAX</span>
      </div>
    </div>

    <!-- AVAILABILITY -->
    <div class="space-y-3">
      <span class="text-xs font-extrabold text-brand-purple tracking-wide font-sans">Availability</span>

      <div class="space-y-3">
        <!-- Available Now Toggle -->
        <div class="flex items-center justify-between py-2 border-b border-slate-100 dark:border-slate-800/50">
          <span class="text-[11px] font-semibold text-slate-700 dark:text-slate-300">Available Now</span>
          <button (click)="toggleAvailableNow()" class="relative h-6 w-11 rounded-full transition-colors duration-300 cursor-pointer active-tap"
            [class]="availableNow() ? 'bg-brand-cyan' : 'bg-slate-200 dark:bg-slate-700'"
          >
            <span class="absolute top-0.5 h-5 w-5 rounded-full bg-white shadow transition-transform duration-300"
              [style.transform]="availableNow() ? 'translateX(22px)' : 'translateX(2px)'"
            ></span>
          </button>
        </div>

        <!-- Available This Week Toggle -->
        <div class="flex items-center justify-between py-2 border-b border-slate-100 dark:border-slate-800/50">
          <span class="text-[11px] font-semibold text-slate-700 dark:text-slate-300">Available This Week</span>
          <button (click)="toggleAvailableThisWeek()" class="relative h-6 w-11 rounded-full transition-colors duration-300 cursor-pointer active-tap"
            [class]="availableThisWeek() ? 'bg-brand-cyan' : 'bg-slate-200 dark:bg-slate-700'"
          >
            <span class="absolute top-0.5 h-5 w-5 rounded-full bg-white shadow transition-transform duration-300"
              [style.transform]="availableThisWeek() ? 'translateX(22px)' : 'translateX(2px)'"
            ></span>
          </button>
        </div>
      </div>
    </div>

    <!-- SPECIALIZATION -->
    <div class="space-y-3">
      <span class="text-xs font-extrabold text-brand-purple tracking-wide font-sans">Specialization</span>
      <div class="flex flex-wrap gap-2">
        <button
          *ngFor="let spec of specializationOptions()"
          (click)="toggleSpecialization(spec)"
          type="button"
          [class]="isSpecSelected(spec)
            ? 'px-4 py-2.5 rounded-xl bg-brand-purple text-white font-extrabold text-[10px] tracking-wide shadow-sm shadow-brand-purple/15 active-tap cursor-pointer transition-all'
            : 'px-4 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-150 dark:border-slate-800 text-slate-600 dark:text-slate-400 font-bold text-[10px] tracking-wide active-tap cursor-pointer transition-all hover:bg-slate-100'"
        >
          {{ spec }}
        </button>
      </div>
    </div>

  </div>

  <!-- ================= BOTTOM ACTION BUTTONS ================= -->
  <div class="shrink-0 space-y-3 pb-2">
    <button
      (click)="applyFilters()"
      type="button"
      class="w-full py-4 rounded-2xl bg-brand-cyan text-white font-extrabold text-sm tracking-wider shadow-lg shadow-brand-cyan/15 active-tap cursor-pointer transition-all hover:opacity-92"
    >
      Apply Filters ({{ resultCount() }} Results)
    </button>
    <button
      (click)="clearAll()"
      type="button"
      class="w-full py-2 text-[10px] font-extrabold text-slate-400 hover:text-brand-purple uppercase tracking-widest cursor-pointer active-tap transition-colors text-center"
    >
      CLEAR ALL
    </button>
  </div>

</div>
