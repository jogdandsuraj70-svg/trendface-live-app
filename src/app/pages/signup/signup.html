<div class="h-full w-full bg-white dark:bg-slate-900 flex flex-col justify-between p-6 animate-screen-in select-none overflow-y-auto transition-colors duration-300">
  
  <!-- ================= TOP SECTION: HEADER BAR ================= -->
  <div class="flex items-center justify-between pt-2">
    <span class="text-lg font-extrabold text-slate-850 dark:text-white font-sans">Trendface</span>
    <button
      (click)="close()"
      class="h-8 w-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-400 dark:text-slate-500 cursor-pointer transition-colors active-tap">
      <i class="pi pi-times text-sm"></i>
    </button>
  </div>

  <!-- ================= MID SECTION: CREATION FORM ================= -->
  <div class="my-auto py-4 space-y-6 flex-1 flex flex-col justify-center">
    
    <!-- Intro headers -->
    <div class="space-y-1.5 pl-0.5">
      <h2 class="text-2xl font-extrabold text-slate-850 dark:text-white tracking-tight font-sans">Create Account</h2>
      <p class="text-[11px] text-slate-405 dark:text-slate-500 leading-relaxed font-body max-w-[310px]">
        Join TrendFace and start collaborating with the world's most elite digital creators.
      </p>
    </div>

    <!-- Alert Message for validation errors -->
    <div *ngIf="errorMessage()" class="p-3 bg-red-50 border border-red-200 rounded-xl text-red-650 text-[10px] font-bold font-sans tracking-wide">
      <i class="pi pi-exclamation-circle mr-1"></i> {{ errorMessage() }}
    </div>

    <!-- Form -->
    <form [formGroup]="signUpForm" (ngSubmit)="onSubmit()" class="space-y-3.5">
      
      <!-- Full Name -->
      <div class="space-y-1">
        <label class="text-[9px] font-extrabold tracking-wider text-slate-450 dark:text-slate-500 uppercase font-sans">Full Name</label>
        <div class="relative flex items-center">
          <span class="absolute left-4.5 text-slate-400"><i class="pi pi-user text-xs"></i></span>
          <input
            type="text"
            formControlName="fullName"
            placeholder="Alexander McQueen"
            class="w-full pl-11 pr-4 py-4 rounded-xl border border-slate-150 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/40 text-xs font-semibold text-slate-800 dark:text-white placeholder-slate-350 focus:border-brand-cyan focus:bg-white transition-all outline-none"
          />
        </div>
      </div>

      <!-- Email Address -->
      <div class="space-y-1">
        <label class="text-[9px] font-extrabold tracking-wider text-slate-450 dark:text-slate-500 uppercase font-sans">Email Address</label>
        <div class="relative flex items-center">
          <span class="absolute left-4.5 text-slate-400"><i class="pi pi-envelope text-xs"></i></span>
          <input
            type="email"
            formControlName="email"
            placeholder="a.ex@trendface.ai"
            class="w-full pl-11 pr-4 py-4 rounded-xl border border-slate-150 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/40 text-xs font-semibold text-slate-800 dark:text-white placeholder-slate-350 focus:border-brand-cyan focus:bg-white transition-all outline-none"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="space-y-1">
        <label class="text-[9px] font-extrabold tracking-wider text-slate-450 dark:text-slate-500 uppercase font-sans">Password</label>
        <div class="relative flex items-center">
          <span class="absolute left-4.5 text-slate-400"><i class="pi pi-lock text-xs"></i></span>
          <input
            [type]="showPassword() ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
            class="w-full pl-11 pr-11 py-4 rounded-xl border border-slate-150 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/40 text-xs font-semibold text-slate-800 dark:text-white placeholder-slate-350 focus:border-brand-cyan focus:bg-white transition-all outline-none"
          />
          <!-- Visibility Toggle -->
          <button
            type="button"
            (click)="togglePasswordVisibility()"
            class="absolute right-4.5 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 cursor-pointer">
            <i class="pi" [ngClass]="showPassword() ? 'pi-eye-slash' : 'pi-eye'" style="font-size: 11px"></i>
          </button>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="space-y-1">
        <label class="text-[9px] font-extrabold tracking-wider text-slate-450 dark:text-slate-500 uppercase font-sans">Confirm Password</label>
        <div class="relative flex items-center">
          <span class="absolute left-4.5 text-slate-400"><i class="pi pi-lock text-xs"></i></span>
          <input
            [type]="showPassword() ? 'text' : 'password'"
            formControlName="confirmPassword"
            placeholder="••••••••"
            class="w-full pl-11 pr-4 py-4 rounded-xl border border-slate-150 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/40 text-xs font-semibold text-slate-800 dark:text-white placeholder-slate-350 focus:border-brand-cyan focus:bg-white transition-all outline-none"
          />
        </div>
      </div>

      <!-- Terms Checkbox -->
      <div class="flex items-start gap-2.5 pt-1">
        <input
          type="checkbox"
          id="terms"
          formControlName="terms"
          class="h-4.5 w-4.5 rounded border-slate-300 dark:border-slate-800 text-brand-cyan focus:ring-brand-cyan/20 cursor-pointer mt-0.5"
        />
        <label for="terms" class="text-[10px] leading-relaxed text-slate-500 dark:text-slate-400 cursor-pointer font-body">
          I agree to the <span class="text-brand-purple font-semibold">Terms</span> & <span class="text-brand-purple font-semibold">Conditions</span>
        </label>
      </div>

      <!-- Submit button -->
      <button
        type="submit"
        [disabled]="isLoading()"
        class="w-full py-4.5 rounded-2xl bg-brand-cyan hover:bg-opacity-92 text-white font-bold text-sm tracking-wide shadow-lg shadow-brand-cyan/15 transition-all active-tap cursor-pointer flex items-center justify-center gap-1.5 mt-2">
        <span *ngIf="!isLoading()">Sign Up</span>
        <span *ngIf="isLoading()" class="flex items-center gap-1.5"><i class="pi pi-spin pi-spinner text-xs"></i> Processing...</span>
      </button>

    </form>

    <!-- Alternative Google divider -->
    <div class="space-y-4 pt-1">
      <div class="relative flex items-center justify-center">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-slate-100 dark:border-slate-800"></div>
        </div>
        <span class="relative px-3.5 text-[8.5px] font-bold text-slate-400 bg-white dark:bg-slate-900 font-sans uppercase tracking-[0.15em]">Or Continue With</span>
      </div>

      <!-- Google Sign Up Button -->
      <button
        type="button"
        (click)="signUpWithGoogle()"
        class="relative w-full p-[1.5px] rounded-2xl bg-gradient-to-r from-brand-cyan via-brand-purple to-brand-pink transition-all active-tap cursor-pointer">
        <span class="flex items-center justify-center gap-2.5 w-full py-4.5 rounded-[14px] bg-white dark:bg-slate-900 text-center font-bold text-xs tracking-wide">
          <i class="pi pi-google bg-gradient-to-r from-brand-cyan to-brand-pink bg-clip-text text-transparent"></i>
          <span class="bg-gradient-to-r from-brand-cyan via-brand-purple to-brand-pink bg-clip-text text-transparent font-sans">
            Sign Up with Google
          </span>
        </span>
      </button>
    </div>

  </div>

  <!-- ================= BOTTOM SECTION: REDIRECT ================= -->
  <div class="text-center pb-2 pt-4">
    <p class="text-[10px] text-slate-400 dark:text-slate-500 font-body">
      Already have an account? 
      <button (click)="goToLogin()" class="font-bold text-brand-cyan hover:underline cursor-pointer ml-1 select-none">Sign In</button>
    </p>
  </div>

</div>
