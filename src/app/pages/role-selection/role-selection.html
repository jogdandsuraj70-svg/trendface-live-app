<div class="h-full w-full bg-white dark:bg-slate-900 flex flex-col justify-between p-6 animate-screen-in select-none transition-colors duration-300">
  
  <!-- ================= TOP SECTION: HEADER BAR ================= -->
  <div class="flex items-center justify-between pt-2">
    <!-- Hamburger Menu -->
    <button class="h-8 w-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-655 dark:text-slate-350 cursor-pointer active-tap">
      <i class="pi pi-bars text-sm"></i>
    </button>
    <!-- Center Wordmark -->
    <span class="text-lg font-extrabold text-slate-850 dark:text-white font-sans">Trendface</span>
    <!-- Right Avatar -->
    <img
      src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&q=80&w=150&h=150"
      class="h-8 w-8 rounded-full object-cover ring-2 ring-slate-100 dark:ring-slate-800 shadow-sm"
      alt="User Profile"
    />
  </div>

  <!-- ================= MID SECTION: INSTRUCTIONS & CARDS ================= -->
  <div class="my-auto py-6 space-y-7 flex-1 flex flex-col justify-center">
    
    <!-- Headers -->
    <div class="space-y-1.5 text-left pl-1">
      <h2 class="text-2xl font-extrabold text-slate-850 dark:text-white tracking-tight font-sans">Choose Your Role</h2>
      <p class="text-xs text-slate-450 dark:text-slate-500 font-body">Select how you want to use TrendFace</p>
    </div>

    <!-- Role Option Cards Grid -->
    <div class="space-y-4">
      
      <!-- Option 1: Makeup Artist -->
      <div
        (click)="selectRole('artist')"
        [class]="getCardClass('artist')">
        <div class="flex items-center gap-4 text-left">
          <!-- Icon Container -->
          <div [class]="getIconClass('artist')">
            <i class="pi pi-palette text-sm"></i>
          </div>
          <div class="space-y-1 pr-2">
            <h4 [class]="getTitleClass('artist')">Makeup Artist</h4>
            <p [class]="getDescriptionClass('artist')">
              Showcase your skills and connect with models through high-fashion
            </p>
          </div>
        </div>
      </div>

      <!-- Option 2: Model -->
      <div
        (click)="selectRole('model')"
        [class]="getCardClass('model')">
        <div class="flex items-center gap-4 text-left">
          <!-- Icon Container -->
          <div [class]="getIconClass('model')">
            <i class="pi pi-camera text-sm"></i>
          </div>
          <div class="space-y-1 pr-2">
            <h4 [class]="getTitleClass('model')">Model</h4>
            <p [class]="getDescriptionClass('model')">
              Discover top artists and build your professional portfolio with ...
            </p>
          </div>
        </div>
      </div>

    </div>

  </div>

  <!-- ================= BOTTOM SECTION: ACTION BUTTON ================= -->
  <div class="w-full pb-4">
    <button
      (click)="confirm()"
      class="w-full py-4.5 rounded-2xl bg-brand-cyan hover:bg-opacity-92 text-white font-bold text-sm tracking-wide shadow-lg shadow-brand-cyan/15 transition-all active-tap cursor-pointer flex items-center justify-center gap-1.5">
      Continue <i class="pi pi-arrow-right text-[10px]"></i>
    </button>
  </div>

</div>
