<div class="h-full w-full bg-white dark:bg-slate-900 flex flex-col p-6 animate-screen-in select-none overflow-y-auto transition-colors duration-300">

  <!-- ================= HEADER BAR ================= -->
  <div class="flex items-center justify-between pt-2 shrink-0">
    <button
      (click)="back()"
      class="h-8 w-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 cursor-pointer active-tap">
      <i class="pi pi-arrow-left text-sm"></i>
    </button>
    <span class="text-md font-extrabold text-slate-850 dark:text-white font-sans tracking-wide">PROFILE</span>
    <button
      (click)="triggerMenu()"
      class="h-8 w-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 cursor-pointer active-tap">
      <i class="pi pi-ellipsis-v text-sm"></i>
    </button>
  </div>

  <!-- ================= LOADING SKELETON ================= -->
  <div *ngIf="isLoading()" class="flex-1 py-6 space-y-6 animate-pulse">
    <div class="flex flex-col items-center space-y-3">
      <div class="h-20 w-20 rounded-full bg-slate-200 dark:bg-slate-800"></div>
      <div class="h-4 w-32 rounded bg-slate-200 dark:bg-slate-800"></div>
      <div class="h-3 w-24 rounded bg-slate-200 dark:bg-slate-800"></div>
    </div>
    <div class="h-16 rounded-2xl bg-slate-200 dark:bg-slate-800"></div>
    <div class="h-20 rounded-2xl bg-slate-200 dark:bg-slate-800"></div>
  </div>

  <!-- ================= PROFILE CONTENT ================= -->
  <div *ngIf="!isLoading() && talent()" class="flex-1 py-5 space-y-5">

    <!-- Profile Header -->
    <div class="flex flex-col items-center justify-center text-center space-y-3">
      <div class="relative">
        <div class="h-20 w-20 rounded-full p-0.5 bg-gradient-to-tr from-brand-cyan via-brand-purple to-brand-pink">
          <img
            [src]="talent()!.imageUrl"
            class="h-full w-full rounded-full object-cover border-2 border-white dark:border-slate-900"
            alt="Profile"
          />
        </div>
        <span *ngIf="talent()!.isAvailable" class="absolute bottom-0 right-0 h-5 w-5 rounded-full bg-green-500 border-2 border-white dark:border-slate-900 flex items-center justify-center">
          <i class="pi pi-check text-white text-[7px]"></i>
        </span>
      </div>

      <div class="space-y-1">
        <h2 class="text-lg font-extrabold text-slate-850 dark:text-white tracking-tight font-sans">{{ talent()!.name }}</h2>
        <span class="text-[9.5px] font-extrabold text-brand-purple uppercase tracking-widest">{{ talent()!.role }}</span>
      </div>
    </div>

    <!-- Stats Row -->
    <div class="w-full py-4 rounded-2xl border border-slate-150 dark:border-slate-800 bg-white dark:bg-slate-900/60 shadow-sm flex items-center justify-around">
      <div class="flex flex-col items-center">
        <span class="text-sm font-extrabold text-brand-purple">{{ talent()!.portfolioImages.length * 12 }}</span>
        <span class="text-[8px] font-extrabold text-slate-450 uppercase tracking-widest mt-0.5">PROJECTS</span>
      </div>
      <div class="h-6 w-px bg-slate-100 dark:bg-slate-800"></div>
      <div class="flex flex-col items-center">
        <span class="text-sm font-extrabold text-brand-purple flex items-center gap-0.5">
          <i class="pi pi-star-fill text-amber-400 text-[9px]"></i> {{ talent()!.rating }}
        </span>
        <span class="text-[8px] font-extrabold text-slate-450 uppercase tracking-widest mt-0.5">RATING</span>
      </div>
      <div class="h-6 w-px bg-slate-100 dark:bg-slate-800"></div>
      <div class="flex flex-col items-center">
        <span class="text-sm font-extrabold text-brand-purple">{{ talent()!.experienceYears }}y</span>
        <span class="text-[8px] font-extrabold text-slate-450 uppercase tracking-widest mt-0.5">EXPERIENCE</span>
      </div>
    </div>

    <!-- Bio -->
    <div class="w-full p-4 rounded-2xl border border-slate-150 dark:border-slate-800 bg-slate-50/40 dark:bg-slate-900/30">
      <p class="text-[11px] leading-relaxed text-slate-700 dark:text-slate-350 font-medium">{{ talent()!.bio }}</p>
      <div class="flex items-center gap-1.5 mt-3 text-brand-purple">
        <i class="pi pi-map-marker text-[10px]"></i>
        <span class="text-[10px] font-extrabold tracking-wider uppercase font-sans">{{ talent()!.location }}</span>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="flex gap-3">
      <button
        (click)="sendConnect()"
        [class]="getConnectButtonClass()"
      >
        <span *ngIf="connectState() === 'Connect'">Connect</span>
        <span *ngIf="connectState() === 'Requested'" class="flex items-center justify-center gap-1">
          <i class="pi pi-spin pi-spinner text-[9px]"></i> Requested
        </span>
        <span *ngIf="connectState() === 'Connected'" class="flex items-center justify-center gap-1">
          <i class="pi pi-check text-[9px]"></i> Connected
        </span>
      </button>
      <button class="flex-1 py-3.5 rounded-2xl border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 font-extrabold text-[11px] tracking-wider active-tap cursor-pointer transition-all hover:bg-slate-50 text-center">
        Message
      </button>
    </div>

    <!-- Specialties -->
    <div class="space-y-2.5">
      <span class="text-[9.5px] font-extrabold tracking-wider text-brand-purple uppercase font-sans">Specialties</span>
      <div class="flex flex-wrap gap-2">
        <span
          *ngFor="let spec of talent()!.specialty"
          class="px-3.5 py-2 rounded-full bg-brand-purple/10 text-brand-purple text-[10px] font-extrabold tracking-wide"
        >
          {{ spec }}
        </span>
      </div>
    </div>

    <!-- Skills -->
    <div class="space-y-2.5">
      <span class="text-[9.5px] font-extrabold tracking-wider text-brand-purple uppercase font-sans">Skills</span>
      <div class="flex flex-wrap gap-2">
        <span
          *ngFor="let skill of talent()!.skills"
          class="px-3.5 py-2 rounded-full bg-slate-50 dark:bg-slate-800 border border-slate-150 dark:border-slate-700 text-slate-600 dark:text-slate-400 text-[10px] font-bold tracking-wide"
        >
          {{ skill }}
        </span>
      </div>
    </div>

    <!-- Portfolio Grid -->
    <div class="space-y-2.5 pb-6">
      <div class="flex justify-between items-center">
        <span class="text-[9.5px] font-extrabold tracking-wider text-brand-purple uppercase font-sans">Portfolio</span>
        <span class="text-slate-400"><i class="pi pi-th-large text-xs"></i></span>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div
          *ngFor="let img of talent()!.portfolioImages"
          class="aspect-[4/5] rounded-2xl overflow-hidden shadow-sm border border-slate-100 dark:border-slate-800/30"
        >
          <img
            [src]="img"
            class="w-full h-full object-cover hover:scale-105 transition-transform duration-500"
            alt="Portfolio"
            loading="lazy"
          />
        </div>
      </div>
    </div>

  </div>

  <!-- NOT FOUND -->
  <div *ngIf="!isLoading() && !talent()" class="flex-1 flex flex-col items-center justify-center text-center space-y-3">
    <div class="h-14 w-14 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center">
      <i class="pi pi-user text-slate-400 text-lg"></i>
    </div>
    <p class="text-xs font-bold text-slate-500">Profile not found</p>
    <button (click)="back()" class="text-[10px] font-bold text-brand-purple cursor-pointer active-tap">Go back to Discover</button>
  </div>

</div>
