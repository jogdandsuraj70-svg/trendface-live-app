<div class="h-full w-full bg-white dark:bg-slate-900 flex flex-col justify-between p-6 animate-screen-in select-none overflow-y-auto transition-colors duration-300">
  
  <!-- ================= TOP SECTION: HEADER BAR ================= -->
  <div class="flex items-center justify-between pt-2">
    <button
      (click)="back()"
      class="h-8 w-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 cursor-pointer active-tap">
      <i class="pi pi-arrow-left text-sm"></i>
    </button>
    <span class="text-lg font-extrabold text-slate-850 dark:text-white font-sans">Trendface</span>
    <div class="w-8"></div> <!-- Spacer -->
  </div>

  <!-- ================= PROGRESS TRACK BAR ================= -->
  <div class="w-full pt-4 space-y-1.5 px-0.5">
    <div class="flex justify-between items-center text-[9px] font-extrabold tracking-wider text-brand-purple uppercase font-sans">
      <span>Step 1 of 3</span>
      <span>33% Complete</span>
    </div>
    <div class="w-full h-1 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
      <div class="h-full w-1/3 bg-gradient-to-r from-brand-cyan to-brand-purple rounded-full"></div>
    </div>
  </div>

  <!-- ================= MID SECTION: PROFILE BUILDER ================= -->
  <div class="my-auto py-5 space-y-6 flex-1 flex flex-col justify-center">
    
    <!-- Title and Subtitle -->
    <div class="space-y-1 pl-0.5">
      <h2 class="text-2xl font-extrabold text-slate-850 dark:text-white tracking-tight font-sans">Basic Information</h2>
      <p class="text-[11px] text-slate-405 dark:text-slate-500 leading-relaxed font-body max-w-[280px]">
        Tell us about yourself to personalize your trend feed.
      </p>
    </div>

    <!-- Error validation card -->
    <div *ngIf="errorMessage()" class="p-3 bg-red-50 border border-red-200 rounded-xl text-red-650 text-[10px] font-bold font-sans tracking-wide">
      <i class="pi pi-exclamation-circle mr-1"></i> {{ errorMessage() }}
    </div>

    <!-- Form layout -->
    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="space-y-4">
      
      <!-- ================= Profile Photo Upload Container ================= -->
      <div class="flex flex-col items-center space-y-2 pt-1 pb-2">
        <input
          #fileInput
          type="file"
          accept="image/*"
          (change)="onPhotoSelected($event)"
          class="hidden"
        />
        
        <!-- Dotted Upload Circle -->
        <button
          type="button"
          (click)="fileInput.click()"
          class="h-24 w-24 rounded-full border-2 border-dashed border-slate-200 dark:border-slate-800 hover:border-brand-purple bg-slate-50/50 dark:bg-slate-900/40 flex flex-col items-center justify-center relative overflow-hidden transition-all duration-300 active-tap cursor-pointer">
          
          <!-- Image Preview (if uploaded) -->
          <img
            *ngIf="photoPreview()"
            [src]="photoPreview()"
            class="h-full w-full object-cover absolute inset-0 z-10"
            alt="Profile Preview"
          />

          <!-- Plus/Camera Default Icon -->
          <div class="flex flex-col items-center gap-1.5 z-0" [ngClass]="{'opacity-0': photoPreview()}">
            <span class="h-8 w-8 rounded-full bg-brand-purple/10 text-brand-purple flex items-center justify-center">
              <i class="pi pi-camera text-sm"></i>
            </span>
          </div>
        </button>
        <span class="text-[9px] font-extrabold tracking-[0.15em] text-slate-450 dark:text-slate-500 uppercase font-sans">
          Add Profile Photo
        </span>
      </div>

      <!-- Full Name -->
      <div class="space-y-1">
        <label class="text-[9px] font-extrabold tracking-wider text-slate-450 dark:text-slate-500 uppercase font-sans">Full Name</label>
        <input
          type="text"
          formControlName="fullName"
          placeholder="Enter your full name"
          class="w-full px-4.5 py-3.5 rounded-xl border border-slate-150 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/40 text-xs font-semibold text-slate-800 dark:text-white placeholder-slate-350 focus:border-brand-cyan focus:bg-white transition-all outline-none"
        />
      </div>

      <!-- Username -->
      <div class="space-y-1">
        <label class="text-[9px] font-extrabold tracking-wider text-slate-450 dark:text-slate-500 uppercase font-sans">Username</label>
        <div class="relative flex items-center">
          <span class="absolute left-4 text-slate-400 text-xs font-semibold font-sans">&#64;</span>
          <input
            type="text"
            formControlName="username"
            placeholder="username"
            class="w-full pl-9 pr-4 py-3.5 rounded-xl border border-slate-150 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/40 text-xs font-semibold text-slate-800 dark:text-white placeholder-slate-350 focus:border-brand-cyan focus:bg-white transition-all outline-none"
          />
        </div>
      </div>

      <!-- Gender Selection -->
      <div class="space-y-1">
        <label class="text-[9px] font-extrabold tracking-wider text-slate-450 dark:text-slate-500 uppercase font-sans">Gender</label>
        <div class="grid grid-cols-3 gap-2">
          <button
            type="button"
            *ngFor="let g of ['Male', 'Female', 'Other']"
            (click)="selectGender(g)"
            class="py-3 text-[11px] font-bold rounded-xl border text-center transition-all duration-300 active-tap cursor-pointer"
            [ngClass]="getGenderClass(g)">
            {{ g }}
          </button>
        </div>
      </div>

      <!-- Date of Birth -->
      <div class="space-y-1">
        <label class="text-[9px] font-extrabold tracking-wider text-slate-450 dark:text-slate-500 uppercase font-sans">Date of Birth</label>
        <div class="relative flex items-center">
          <input
            type="date"
            formControlName="dob"
            class="w-full px-4.5 py-3.5 rounded-xl border border-slate-150 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/40 text-xs font-semibold text-slate-800 dark:text-white placeholder-slate-350 focus:border-brand-cyan focus:bg-white transition-all outline-none"
          />
        </div>
      </div>

      <!-- Location (Optional) -->
      <div class="space-y-1">
        <label class="text-[9px] font-extrabold tracking-wider text-slate-450 dark:text-slate-500 uppercase font-sans">Location (Optional)</label>
        <div class="relative flex items-center">
          <input
            type="text"
            formControlName="location"
            placeholder="City, Country"
            class="w-full pr-11 pl-4.5 py-3.5 rounded-xl border border-slate-150 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/40 text-xs font-semibold text-slate-800 dark:text-white placeholder-slate-350 focus:border-brand-cyan focus:bg-white transition-all outline-none"
          />
          <span class="absolute right-4.5 text-slate-400"><i class="pi pi-map-marker text-xs"></i></span>
        </div>
      </div>

      <!-- Submit button -->
      <button
        type="submit"
        [disabled]="isLoading()"
        class="w-full py-4.5 rounded-2xl bg-brand-cyan hover:bg-opacity-92 text-white font-bold text-sm tracking-wide shadow-lg shadow-brand-cyan/15 transition-all active-tap cursor-pointer flex items-center justify-center gap-1.5 mt-4">
        <span *ngIf="!isLoading()">Continue →</span>
        <span *ngIf="isLoading()" class="flex items-center gap-1.5"><i class="pi pi-spin pi-spinner text-xs"></i> Saving...</span>
      </button>

    </form>

  </div>

</div>
