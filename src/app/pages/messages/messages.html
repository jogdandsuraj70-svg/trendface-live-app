<div class="h-full w-full bg-white dark:bg-slate-900 flex flex-col p-6 animate-screen-in select-none overflow-y-auto transition-colors duration-300 relative">

  <!-- ================= TOP HEADER BAR ================= -->
  <div class="flex items-center justify-between pt-2 shrink-0">
    <div (click)="openProfile()" class="h-10 w-10 rounded-full p-0.5 bg-gradient-to-tr from-brand-cyan to-brand-purple hover:scale-105 transition-transform cursor-pointer">
      <img
        [src]="profileImage()"
        class="h-full w-full rounded-full object-cover border-2 border-white dark:border-slate-900"
        alt="User Profile"
      />
    </div>

    <h1 class="text-base font-extrabold text-slate-850 dark:text-white font-sans tracking-tight">Messages</h1>

    <button
      (click)="back()"
      type="button"
      class="h-8 w-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-750 dark:text-slate-350 cursor-pointer active-tap"
    >
      <i class="pi pi-home text-sm"></i>
    </button>
  </div>

  <!-- ================= SEARCH CONVERSATIONS SECTION ================= -->
  <div class="pt-5 shrink-0">
    <div class="relative flex items-center">
      <span class="absolute left-4 text-slate-400"><i class="pi pi-search text-xs"></i></span>
      <input
        type="text"
        [(ngModel)]="searchQuery"
        placeholder="Search conversations..."
        class="w-full pl-10 pr-4 py-3 rounded-2xl border border-slate-150 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/40 text-[11px] font-semibold text-slate-850 dark:text-white placeholder-slate-350 focus:border-brand-cyan focus:bg-white transition-all outline-none"
      />
    </div>
  </div>

  <!-- ================= FILTER TABS ================= -->
  <div class="pt-4 shrink-0 flex items-center gap-2 overflow-x-auto no-scrollbar scroll-smooth">
    <button
      (click)="selectTab('all')"
      type="button"
      [class]="selectedTab() === 'all' ?
        'px-5 py-2.5 rounded-full bg-brand-purple/10 text-brand-purple font-extrabold text-[10px] tracking-wide border border-brand-purple/10 transition-all cursor-pointer whitespace-nowrap' :
        'px-5 py-2.5 rounded-full bg-slate-50 dark:bg-slate-900 border border-slate-150 dark:border-slate-800 text-slate-650 dark:text-slate-400 font-bold text-[10px] tracking-wide transition-all hover:bg-slate-100 cursor-pointer whitespace-nowrap'"
    >
      All
    </button>
    <button
      (click)="selectTab('unread')"
      type="button"
      [class]="selectedTab() === 'unread' ?
        'px-5 py-2.5 rounded-full bg-brand-purple/10 text-brand-purple font-extrabold text-[10px] tracking-wide border border-brand-purple/10 transition-all cursor-pointer whitespace-nowrap' :
        'px-5 py-2.5 rounded-full bg-slate-50 dark:bg-slate-900 border border-slate-150 dark:border-slate-800 text-slate-650 dark:text-slate-400 font-bold text-[10px] tracking-wide transition-all hover:bg-slate-100 cursor-pointer whitespace-nowrap'"
    >
      Unread
    </button>
    <button
      (click)="selectTab('booking')"
      type="button"
      [class]="selectedTab() === 'booking' ?
        'px-5 py-2.5 rounded-full bg-brand-purple/10 text-brand-purple font-extrabold text-[10px] tracking-wide border border-brand-purple/10 transition-all cursor-pointer whitespace-nowrap' :
        'px-5 py-2.5 rounded-full bg-slate-50 dark:bg-slate-900 border border-slate-150 dark:border-slate-800 text-slate-650 dark:text-slate-400 font-bold text-[10px] tracking-wide transition-all hover:bg-slate-100 cursor-pointer whitespace-nowrap'"
    >
      Bookings
    </button>
    <button
      (click)="selectTab('request')"
      type="button"
      [class]="selectedTab() === 'request' ?
        'px-5 py-2.5 rounded-full bg-brand-purple/10 text-brand-purple font-extrabold text-[10px] tracking-wide border border-brand-purple/10 transition-all cursor-pointer whitespace-nowrap' :
        'px-5 py-2.5 rounded-full bg-slate-50 dark:bg-slate-900 border border-slate-150 dark:border-slate-800 text-slate-650 dark:text-slate-400 font-bold text-[10px] tracking-wide transition-all hover:bg-slate-100 cursor-pointer whitespace-nowrap'"
    >
      Requests
    </button>
  </div>

  <!-- ================= CHAT LIST SECTION ================= -->
  <div class="flex-1 py-5 space-y-3.5">
    <div *ngIf="getFilteredConversations().length === 0" class="flex flex-col items-center justify-center py-10 text-center space-y-2.5">
      <div class="h-12 w-12 rounded-full bg-slate-50 dark:bg-slate-850 flex items-center justify-center text-slate-400">
        <i class="pi pi-comments text-lg"></i>
      </div>
      <div>
        <h4 class="text-xs font-extrabold text-slate-800 dark:text-white leading-none">No Conversations</h4>
        <p class="text-[10px] font-semibold text-slate-400 dark:text-slate-500 mt-1">Try refining your search queries.</p>
      </div>
    </div>

    <!-- Active Chat Cards -->
    <div
      *ngFor="let convo of getFilteredConversations()"
      (click)="openChat(convo.id)"
      class="rounded-2xl border border-slate-150 dark:border-slate-800 p-4 flex items-center justify-between bg-white dark:bg-slate-900 hover:border-brand-purple/20 transition-all cursor-pointer relative shadow-xs animate-screen-in"
    >
      <!-- Avatar Section with Online/Offline Presence -->
      <div class="flex items-center gap-3.5 flex-1 min-w-0">
        <div class="relative shrink-0">
          <img
            [src]="convo.avatarUrl"
            class="h-11 w-11 rounded-full object-cover"
            [alt]="convo.name"
          />
          <!-- Bright green active presence dot -->
          <span
            *ngIf="convo.online"
            class="absolute bottom-0 right-0 h-3 w-3 rounded-full bg-green-500 border-2 border-white dark:border-slate-900"
          ></span>
        </div>

        <div class="flex flex-col flex-1 min-w-0 space-y-0.5">
          <div class="flex items-center justify-between">
            <h3 class="text-xs font-extrabold text-slate-850 dark:text-white tracking-tight truncate pr-2">
              {{ convo.name }}
            </h3>
            <span class="text-[8px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-tight shrink-0">
              {{ convo.lastMessageTime }}
            </span>
          </div>

          <div class="flex items-center justify-between">
            <p
              [class]="convo.unreadCount > 0 ?
                'text-[10px] font-extrabold text-slate-800 dark:text-white truncate pr-2' :
                convo.typing ? 'text-[10px] font-extrabold text-brand-purple italic animate-pulse pr-2' :
                'text-[10px] font-semibold text-slate-400 dark:text-slate-500 truncate pr-2'"
            >
              {{ convo.lastMessage }}
            </p>

            <!-- Dynamic Unread Indicator Dot -->
            <span
              *ngIf="convo.unreadCount > 0"
              class="h-2 w-2 rounded-full bg-brand-purple shrink-0"
            ></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ================= FLOATING ACTION BUTTON (FAB) ================= -->
  <button
    (click)="triggerNewChat()"
    type="button"
    class="absolute bottom-6 right-6 h-12 w-12 rounded-full bg-gradient-to-tr from-brand-cyan to-brand-purple text-white flex items-center justify-center shadow-lg shadow-brand-purple/25 hover:scale-105 active:scale-95 transition-all cursor-pointer active-tap z-20"
  >
    <i class="pi pi-plus text-sm"></i>
  </button>

</div>
