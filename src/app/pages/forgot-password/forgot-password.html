<div class="h-full w-full bg-white dark:bg-slate-900 flex flex-col justify-between p-6 animate-screen-in select-none overflow-y-auto transition-colors duration-300">
  
  <!-- ================= TOP SECTION: HEADER BAR ================= -->
  <div class="flex items-center justify-between pt-2">
    <button
      (click)="back()"
      class="h-8 w-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 cursor-pointer active-tap">
      <i class="pi pi-arrow-left text-sm"></i>
    </button>
    <span class="text-xs font-extrabold text-slate-450 dark:text-slate-500 font-sans tracking-[0.2em] uppercase">Forgot Password</span>
    <div class="w-8"></div> <!-- Spacer -->
  </div>

  <!-- ================= MID SECTION: RESET FORM ================= -->
  <div class="my-auto py-4 space-y-6 flex-1 flex flex-col justify-center">
    
    <!-- Intro headers -->
    <div class="space-y-1.5 pl-0.5">
      <h2 class="text-2xl font-extrabold text-slate-850 dark:text-white tracking-tight font-sans">Forgot Password</h2>
      <p class="text-[11px] text-slate-405 dark:text-slate-500 leading-relaxed font-body max-w-[280px]">
        Enter your email address and we'll send you a link to reset your password.
      </p>
    </div>

    <!-- Feedback messages -->
    <div *ngIf="errorMessage()" class="p-3 bg-red-50 border border-red-200 rounded-xl text-red-650 text-[10px] font-bold font-sans tracking-wide">
      <i class="pi pi-exclamation-circle mr-1"></i> {{ errorMessage() }}
    </div>

    <div *ngIf="successMessage()" class="p-3 bg-green-50 border border-green-200 rounded-xl text-green-750 text-[10px] font-bold font-sans tracking-wide">
      <i class="pi pi-check-circle mr-1"></i> {{ successMessage() }}
    </div>

    <!-- Form -->
    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="space-y-4">
      
      <!-- Email Address -->
      <div class="space-y-1">
        <label class="text-[9px] font-extrabold tracking-wider text-slate-450 dark:text-slate-500 uppercase font-sans">Email Address</label>
        <div class="relative flex items-center">
          <span class="absolute left-4.5 text-slate-400"><i class="pi pi-envelope text-xs"></i></span>
          <input
            type="email"
            formControlName="email"
            placeholder="name@trendface.com"
            class="w-full pl-11 pr-4 py-4 rounded-xl border border-slate-150 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/40 text-xs font-semibold text-slate-800 dark:text-white placeholder-slate-350 focus:border-brand-cyan focus:bg-white transition-all outline-none"
          />
        </div>
      </div>

      <!-- Action Button -->
      <button
        type="submit"
        [disabled]="isLoading()"
        class="w-full py-4.5 rounded-2xl bg-brand-cyan hover:bg-opacity-92 text-white font-bold text-sm tracking-wide shadow-lg shadow-brand-cyan/15 transition-all active-tap cursor-pointer flex items-center justify-center gap-1.5 pt-2">
        <span *ngIf="!isLoading()">Send Reset Link →</span>
        <span *ngIf="isLoading()" class="flex items-center gap-1.5"><i class="pi pi-spin pi-spinner text-xs"></i> Sending...</span>
      </button>

    </form>

  </div>

  <!-- ================= BOTTOM SECTION: BACK TO LOGIN ================= -->
  <div class="text-center pb-2 pt-4">
    <button
      (click)="back()"
      class="text-[10px] font-extrabold text-slate-500 hover:text-slate-800 transition-colors cursor-pointer flex items-center justify-center gap-1.5 mx-auto font-sans uppercase tracking-[0.1em]">
      <i class="pi pi-angle-left" style="font-size: 11px"></i> Back to Login
    </button>
  </div>

</div>
