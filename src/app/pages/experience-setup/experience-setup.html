<div class="h-full w-full bg-white dark:bg-slate-900 flex flex-col justify-between p-6 animate-screen-in select-none overflow-y-auto transition-colors duration-300">
  
  <!-- ================= TOP SECTION: HEADER BAR ================= -->
  <div class="flex items-center justify-between pt-2">
    <button
      (click)="back()"
      class="h-8 w-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 cursor-pointer active-tap">
      <i class="pi pi-arrow-left text-sm"></i>
    </button>
    <span class="text-lg font-extrabold text-slate-850 dark:text-white font-sans">Trendface</span>
    <div class="w-8"></div> <!-- Spacer -->
  </div>

  <!-- ================= PROGRESS TRACK BAR ================= -->
  <div class="w-full pt-4 space-y-1.5 px-0.5">
    <div class="flex justify-between items-center text-[9px] font-extrabold tracking-wider text-brand-purple uppercase font-sans">
      <span>Step 2 of 3</span>
      <span>66% Complete</span>
    </div>
    <div class="w-full h-1 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
      <div class="h-full w-2/3 bg-gradient-to-r from-brand-cyan to-brand-purple rounded-full"></div>
    </div>
  </div>

  <!-- ================= MID SECTION: EXPERIENCE FORM ================= -->
  <div class="my-auto py-5 space-y-5.5 flex-1 flex flex-col justify-center">
    
    <!-- Title and Subtitle -->
    <div class="space-y-1 pl-0.5">
      <h2 class="text-2xl font-extrabold text-slate-850 dark:text-white tracking-tight font-sans">Tell us about your experience</h2>
      <p class="text-[11px] text-slate-405 dark:text-slate-500 leading-relaxed font-body max-w-[280px]">
        Define your professional footprint in the digital atelier.
      </p>
    </div>

    <!-- Error validation card -->
    <div *ngIf="errorMessage()" class="p-3 bg-red-50 border border-red-200 rounded-xl text-red-650 text-[10px] font-bold font-sans tracking-wide">
      <i class="pi pi-exclamation-circle mr-1"></i> {{ errorMessage() }}
    </div>

    <!-- Form layout -->
    <form [formGroup]="expForm" (ngSubmit)="onSubmit()" class="space-y-4">
      
      <!-- Experience Level Cards -->
      <div class="space-y-1.5">
        <label class="text-[9.5px] font-extrabold tracking-wider text-brand-purple uppercase font-sans pl-0.5">Experience Level</label>
        <div class="grid grid-cols-3 gap-2.5">
          <!-- Beginner -->
          <button
            type="button"
            (click)="selectLevel('BEGINNER')"
            class="py-4.5 rounded-2xl border text-center flex flex-col items-center justify-center gap-2 transition-all duration-300 active-tap cursor-pointer"
            [ngClass]="getLevelClass('BEGINNER')">
            <i class="pi pi-face-smile text-base"></i>
            <span class="text-[9px] font-extrabold tracking-wider uppercase font-sans">Beginner</span>
          </button>

          <!-- Intermediate -->
          <button
            type="button"
            (click)="selectLevel('INTERMEDIATE')"
            class="py-4.5 rounded-2xl border text-center flex flex-col items-center justify-center gap-2 transition-all duration-300 active-tap cursor-pointer"
            [ngClass]="getLevelClass('INTERMEDIATE')">
            <i class="pi pi-chart-line text-base"></i>
            <span class="text-[9px] font-extrabold tracking-wider uppercase font-sans">Intermediate</span>
          </button>

          <!-- Pro -->
          <button
            type="button"
            (click)="selectLevel('PRO')"
            class="py-4.5 rounded-2xl border text-center flex flex-col items-center justify-center gap-2 transition-all duration-300 active-tap cursor-pointer"
            [ngClass]="getLevelClass('PRO')">
            <i class="pi pi-award text-base"></i>
            <span class="text-[9px] font-extrabold tracking-wider uppercase font-sans">Pro</span>
          </button>
        </div>
      </div>

      <!-- Specialties Selection Section -->
      <div class="space-y-2">
        <label class="text-[9.5px] font-extrabold tracking-wider text-brand-purple uppercase font-sans pl-0.5">Specialties</label>
        <div class="flex flex-wrap gap-2 pt-0.5">
          <button
            type="button"
            *ngFor="let spec of specialtiesList()"
            (click)="toggleSpecialty(spec)"
            class="px-4 py-2.5 rounded-full border text-[11px] font-bold flex items-center gap-1.5 transition-all duration-300 active-tap cursor-pointer"
            [ngClass]="getSpecialtyClass(spec)">
            <span>{{ spec }}</span>
            <i *ngIf="isSpecialtySelected(spec)" class="pi pi-times text-[8px] opacity-75"></i>
          </button>

          <!-- Dynamic + Add Button -->
          <button
            type="button"
            (click)="addNewSpecialtyPrompt()"
            class="px-4 py-2.5 rounded-full border border-slate-150 dark:border-slate-800 text-[11px] font-bold bg-white dark:bg-slate-900 text-brand-purple flex items-center gap-1 hover:bg-slate-50 active-tap cursor-pointer">
            <i class="pi pi-plus text-[9px]"></i> Add
          </button>
        </div>
      </div>

      <!-- Specialties URL Field -->
      <div class="space-y-1">
        <label class="text-[9.5px] font-extrabold tracking-wider text-brand-purple uppercase font-sans pl-0.5">Specialties</label>
        <div class="relative flex items-center">
          <span class="absolute left-4.5 text-slate-400"><i class="pi pi-link text-xs"></i></span>
          <input
            type="text"
            formControlName="portfolioUrl"
            placeholder="https://yourportfolio.com"
            class="w-full pl-11 pr-4 py-3.5 rounded-xl border border-slate-150 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/40 text-xs font-semibold text-slate-850 dark:text-white placeholder-slate-350 focus:border-brand-cyan focus:bg-white transition-all outline-none"
          />
        </div>
      </div>

      <!-- Brief Bio Section -->
      <div class="space-y-1.5">
        <div class="flex justify-between items-center pl-0.5">
          <label class="text-[9.5px] font-extrabold tracking-wider text-brand-purple uppercase font-sans">Brief Bio</label>
          <span class="text-[9px] font-semibold text-slate-450 dark:text-slate-500 font-sans tracking-wide">
            {{ bioCharacterCount() }} / 300
          </span>
        </div>
        <textarea
          formControlName="bio"
          maxLength="300"
          (input)="onBioInput($event)"
          placeholder="Describe your creative vision and aesthetic approach..."
          class="w-full px-4.5 py-4 rounded-xl border border-slate-150 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/40 text-xs font-semibold text-slate-850 dark:text-white placeholder-slate-350 focus:border-brand-cyan focus:bg-white transition-all outline-none h-24 resize-none font-body leading-relaxed"
        ></textarea>
      </div>

      <!-- Submit CTA button -->
      <button
        type="submit"
        [disabled]="isLoading()"
        class="w-full py-4.5 rounded-2xl bg-brand-cyan hover:bg-opacity-92 text-white font-bold text-sm tracking-wide shadow-lg shadow-brand-cyan/15 transition-all active-tap cursor-pointer flex items-center justify-center gap-1.5 mt-4">
        <span *ngIf="!isLoading()">Continue →</span>
        <span *ngIf="isLoading()" class="flex items-center gap-1.5"><i class="pi pi-spin pi-spinner text-xs"></i> Saving Profile...</span>
      </button>

    </form>

  </div>

</div>
