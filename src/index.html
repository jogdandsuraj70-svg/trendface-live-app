<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Trendface</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <script>
      (function () {
        var redirect = sessionStorage.getItem('trendface.redirect');
        if (redirect) {
          sessionStorage.removeItem('trendface.redirect');
          history.replaceState(null, '', redirect);
        }
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
