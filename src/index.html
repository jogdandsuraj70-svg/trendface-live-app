<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Trendface</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <script>
      (function () {
        var redirect = sessionStorage.getItem('trendface.redirect');
        if (redirect) {
          sessionStorage.removeItem('trendface.redirect');
          try {
            var url = new URL(redirect);
            var basePath = '/trendface-live-app';
            var route = url.pathname.indexOf(basePath) === 0
              ? url.pathname.slice(basePath.length)
              : url.pathname;
            route = route || '/';
            history.replaceState(null, '', basePath + '/#' + route + url.search + url.hash);
          } catch (error) {
            history.replaceState(null, '', redirect);
          }
        }
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
