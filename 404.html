<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Trendface</title>
    <script>
      (function () {
        var basePath = '/trendface-live-app';
        var route = location.pathname.indexOf(basePath) === 0
          ? location.pathname.slice(basePath.length)
          : location.pathname;
        route = route || '/';
        location.replace(basePath + '/#' + route + location.search + location.hash);
      })();
    </script>
  </head>
  <body></body>
</html>
